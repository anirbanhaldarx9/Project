<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Enrollment Form</title>
<style>
</style>
</head>
<body>
<div class="container">
<h2>Student Course Enrollment Form</h2>
<form>
<div class="form-group">
<label>Full Name</label>
  
<input type="text" placeholder="Enter your full name">
</div>
<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email">
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">
</div>
<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>
<div class="form-group">
<label>Gender</label>
<div class="radio-group">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Other</label>
</div>
</div>
<div class="form-group"> <label>Select Course</label>
<select>
<option>Choose a Course</option>
<option>Web Development</option>
<option>Java Programming</option>
<option>Python Programming</option>
<option>Data Science</option>
<option>Artificial Intelligence</option>
</select>
</div>
<div class="form-group">
<label>Educational Qualification</label>
<select>
<option>Higher Secondary</option>
<option>Diploma</option>
<option>Undergraduate</option>
<option>Postgraduate</option>
</select>
</div>
<div class="form-group">
<label>Preferred Learning Mode</label>
<div class="checkbox-group">
<label><input type="checkbox"> Online</label>
<label><input type="checkbox"> Offline</label>
<label><input type="checkbox"> Hybrid</label>
</div>
</div>
<div class="form-group">
<label>Address</label>
<textarea rows="4" placeholder="Enter your address"></textarea>
</div>
<button type="submit">Enroll Now</button>
</form>
</div>
</body>
</html>
