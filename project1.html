<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Gallery</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            font-family:Arial, sans-serif;
        }

        .gallery{
            width:90%;
            max-width:1000px;
            border: 2px solid purple;
            border-radius: 10px;
            background: #1cb9f7;
            padding: 20px;
            margin: 10px;
            display:grid;
            grid-template-columns:1fr 1fr 1fr;
            grid-template-rows:200px 250px 150px;
            gap:10px;
        }

        .gallery img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:5px;
        }

        .img1{
            grid-row:1 / 3;
            grid-column:1;
            transition: all 0.3s ease; 

        }
        .img1:hover,.img2:hover,.img3:hover,.img4:hover,.img5:hover,.img6:hover{
            transform: scale(1.05) translateY(5px);
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            border: 2px solid lightgreen;
            border-radius: 10px;
            cursor: pointer;
        }

        .img2{
            grid-row:1;
            grid-column:2;
             transition: all 0.3s ease;
        }

        .img3{
            grid-row:1 / 3;
            grid-column:3;
             transition: all 0.3s ease;
        }

        .img4{
            grid-row:2 / 4;
            grid-column:2;
             transition: all 0.3s ease;
        }

        .img5{
            grid-row:3;
            grid-column:1;
             transition: all 0.3s ease;
        }

        .img6{
            grid-row:3;
            grid-column:3;
             transition: all 0.3s ease;
        }
    </style>
</head>

<body>

<div class="gallery">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" class="img1" alt="Image 1">
    
    <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=800&q=80" class="img2" alt="Image 2">
    
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" class="img3" alt="Image 3">
    
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=800&q=80" class="img4" alt="Image 4">
    
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80" class="img5" alt="Image 5">
    
    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=800&q=80" class="img6" alt="Image 6">
</div>

</body>
</html>
